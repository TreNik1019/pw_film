info:
  name: Ungueltige ID
  type: http
  seq: 4

http:
  method: GET
  url: "{{restUrl}}/:id"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: id
      value: abc
      type: path
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json(; charset=utf-8)?$
    - expression: res.body.error
      operator: eq
      value: Invalid film ID format

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
