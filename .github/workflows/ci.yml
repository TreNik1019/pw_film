name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: film
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Formatierungsfehler gefunden. Bitte gofmt . ausführen."
            gofmt -d .
            exit 1
          fi

      - name: Download dependencies
        run: go mod download

      - name: Build server
        run: go build ./cmd/server

      - name: Create pw.txt for tests
        run: |
          mkdir -p internal/postgres
          echo "testpassword" > internal/postgres/pw.txt

      - name: Run all tests
        run: go test ./... -v
